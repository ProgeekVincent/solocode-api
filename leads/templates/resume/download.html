<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading Resume...</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#222222]">

    <div class="min-h-screen flex items-center justify-center px-4 py-8">

        <div class="w-full max-w-lg">

            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 sm:p-10">

                <!-- Success Icon -->
                <div class="flex justify-center">
                    <div class="flex items-center justify-center w-20 h-20 rounded-full bg-green-100">
                        <svg
                            class="w-10 h-10 text-green-600"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M5 13l4 4L19 7"
                            />
                        </svg>
                    </div>
                </div>

                <!-- Heading -->
                <div class="mt-6 text-center">
                    <h1 class="text-3xl font-bold text-slate-900">
                        Thank You
                    </h1>

                    <p class="mt-3 text-slate-600 leading-relaxed">
                        Your resume download should begin automatically.
                        If it doesn't start within a few seconds, use the button below.
                    </p>
                </div>

                <!-- Loading Indicator -->
                <div class="flex justify-center mt-8">
                    <div
                        class="h-10 w-10 rounded-full border-4 border-slate-200 border-t-slate-800 animate-spin"
                    ></div>
                </div>

                <!-- Download Button -->
                <div class="mt-8">
                    <a
                        href="{% url 'resume-file-download' token %}"
                        class="w-full flex items-center justify-center rounded-xl bg-slate-900 px-6 py-4 text-white font-medium transition hover:bg-slate-800"
                    >
                        Download Resume
                    </a>
                </div>

                <!-- Divider -->
                <div class="my-8 border-t border-slate-200"></div>

                <!-- Optional Personal Links -->
                <div class="space-y-3">

                    <p class="text-center text-sm text-slate-500">
                        Learn more about my work
                    </p>

                    <div class="flex flex-col sm:flex-row gap-3">


                        <a
                            href="https://yourportfolio.com"
                            target="_blank"
                            class="flex-1 text-center rounded-xl border border-slate-300 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50"
                        >
                            Portfolio
                        </a>

                        <a
                            href="https://github.com/yourusername"
                            target="_blank"
                            class="flex-1 text-center rounded-xl border border-slate-300 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50"
                        >
                            GitHub
                        </a>

                        <a
                            href="https://linkedin.com/in/yourprofile"
                            target="_blank"
                            class="flex-1 text-center rounded-xl border border-slate-300 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50"
                        >
                            LinkedIn
                        </a>

                    </div>

                </div>

                <!-- Footer -->
                <div class="mt-8 text-center">
                    <p class="text-xs text-slate-400">
                        Having trouble downloading the file?
                        Reply to the email and I'll gladly send it directly.
                    </p>
                </div>

            </div>

        </div>

    </div>

    <!-- Auto Download -->
    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                window.location.href =
                    "{% url 'resume-file-download' token %}";
            }, 1500);
        });
    </script>

</body>
</html>
